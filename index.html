<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marino Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #c8a96e;
      --accent2: #7ec8c8;
      --text: #e8e4dc;
      --muted: #7a7870;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 4rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(200,169,110,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 100%, rgba(126,200,200,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .staff-decoration {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.03;
      overflow: hidden;
    }

    .staff-line {
      position: absolute;
      left: 0; width: 100%; height: 1px;
      background: var(--text);
    }

    header {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 3.5rem 1.5rem 2rem;
      text-align: center;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      margin-bottom: 1.25rem;
    }

    .logo-mark svg {
      width: 26px; height: 26px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      margin-top: 0.6rem;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    .divider {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.75rem auto 0;
    }

    .grid {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 1.25rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 2rem;
    }

    .app-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.75rem;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      overflow: hidden;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .app-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    .app-card:hover::before { opacity: 1; }

    .card-tone::before   { background: radial-gradient(ellipse at top, rgba(200,169,110,0.12), transparent 70%); }
    .card-rhythm::before { background: radial-gradient(ellipse at top, rgba(126,200,200,0.12), transparent 70%); }
    .card-metro::before  { background: radial-gradient(ellipse at top, rgba(180,120,200,0.12), transparent 70%); }
    .card-string::before { background: radial-gradient(ellipse at top, rgba(120,200,140,0.12), transparent 70%); }

    .card-tone:hover   { border-color: rgba(200,169,110,0.35); }
    .card-rhythm:hover { border-color: rgba(126,200,200,0.35); }
    .card-metro:hover  { border-color: rgba(180,120,200,0.35); }
    .card-string:hover { border-color: rgba(120,200,140,0.35); }

    .app-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-tone   .app-icon { background: rgba(200,169,110,0.15); }
    .card-rhythm .app-icon { background: rgba(126,200,200,0.15); }
    .card-metro  .app-icon { background: rgba(180,120,200,0.15); }
    .card-string .app-icon { background: rgba(120,200,140,0.15); }

    .app-icon svg {
      width: 28px; height: 28px;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-tone   .app-icon svg { stroke: #c8a96e; }
    .card-rhythm .app-icon svg { stroke: #7ec8c8; }
    .card-metro  .app-icon svg { stroke: #c878d8; }
    .card-string .app-icon svg { stroke: #78c88a; }

    .app-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .app-desc {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
      font-weight: 300;
    }

    .arrow {
      font-size: 0.75rem;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }

    .app-card:hover .arrow {
      color: var(--text);
      transform: translateX(3px);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 3rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 340px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="staff-decoration" aria-hidden="true">
    <div class="staff-line" style="top:22%"></div>
    <div class="staff-line" style="top:28%"></div>
    <div class="staff-line" style="top:34%"></div>
    <div class="staff-line" style="top:40%"></div>
    <div class="staff-line" style="top:46%"></div>
    <div class="staff-line" style="top:62%"></div>
    <div class="staff-line" style="top:68%"></div>
    <div class="staff-line" style="top:74%"></div>
    <div class="staff-line" style="top:80%"></div>
    <div class="staff-line" style="top:86%"></div>
  </div>

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 18V5l12-2v13M9 18c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3zm12-2c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3z"/>
      </svg>
    </div>
    <h1>Marino <em>Music</em></h1>
    <p class="tagline">Interactive Tools for Musicians</p>
    <div class="divider"></div>
  </header>

  <main class="grid">

    <!-- Tone Trainer -->
    <a class="app-card card-tone" href="https://tonetrainer.app" target="_blank" rel="noopener">
      <div class="app-icon">
        <svg viewBox="0 0 24 24">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3v5z"/>
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3v5z"/>
        </svg>
      </div>
      <div class="app-name">Tone Trainer</div>
      <div class="app-desc">Ear training for pitch &amp; intervals</div>
      <div class="arrow">→</div>
    </a>

    <!-- Rhythm Trainer -->
    <a class="app-card card-rhythm" href="https://rhythmtrainer.app" target="_blank" rel="noopener">
      <div class="app-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="app-name">Rhythm Trainer</div>
      <div class="app-desc">Feel the beat, master time</div>
      <div class="arrow">→</div>
    </a>

    <!-- Metrodrums -->
    <a class="app-card card-metro" href="https://metrodrums.marinomusic.net" target="_blank" rel="noopener">
      <div class="app-icon">
        <svg viewBox="0 0 24 24">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
      <div class="app-name">Metrodrums</div>
      <div class="app-desc">Drum machine &amp; metronome</div>
      <div class="arrow">→</div>
    </a>

    <!-- String Fingering Chart -->
    <a class="app-card card-string" href="https://stringfingers.marinomusic.net" target="_blank" rel="noopener">
      <div class="app-icon">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="2" x2="12" y2="22"/>
          <line x1="8"  y1="2" x2="8"  y2="22"/>
          <line x1="16" y1="2" x2="16" y2="22"/>
          <line x1="4"  y1="6" x2="20" y2="6"/>
          <line x1="4"  y1="10" x2="20" y2="10"/>
          <line x1="4"  y1="14" x2="20" y2="14"/>
          <line x1="4"  y1="18" x2="20" y2="18"/>
        </svg>
      </div>
      <div class="app-name">String Fingerings</div>
      <div class="app-desc">Chord &amp; scale fingering charts</div>
      <div class="arrow">→</div>
    </a>

  </main>

  <footer>
    <p>© 2026 <a href="/">marinomusic.net</a></p>
  </footer>

</body>
</html>
